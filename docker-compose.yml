version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkir_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mariadb
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=parkir
      - DB_USERNAME=root
      - DB_PASSWORD=rahasia_parkir
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - TRUSTED_PROXIES=*
      - SESSION_SECURE_COOKIE=true
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: parkir_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx-container.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: parkir_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: parkir
      MYSQL_ROOT_PASSWORD: rahasia_parkir
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: